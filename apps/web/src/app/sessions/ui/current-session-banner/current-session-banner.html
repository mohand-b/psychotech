<div class="banner">
  <div class="banner__inner flex items-center gap-4">
    <div class="banner__info flex items-center gap-5">
      <span class="t-label">Session en cours</span>
      <span class="banner__text">
        <span class="banner__mode">{{ modeLabel() }}</span>
        <span class="banner__sep">·</span>
        <span class="banner__muted">{{ sectorLabel() }}</span>
        <span class="banner__sep">·</span>
        <span class="banner__count">{{ doneCount() }}/{{ axisTotal() }}</span
        >&ngsp;<span class="banner__muted">axes</span>
      </span>
      <ui-chevron-stepper
        class="banner__stepper"
        variant="mini"
        [steps]="steps()"
      />
    </div>
    <div class="banner__compact flex flex-col gap-1.5">
      <span class="banner__compact-title">Session en cours</span>
      <span class="banner__compact-meta flex items-center gap-2">
        <span class="banner__dots flex items-center gap-1">
          @for (dot of dots(); track $index) {
            <span
              class="banner__dot"
              [class.banner__dot--current]="dot.state === 'current'"
              [class.banner__dot--todo]="dot.state === 'todo'"
              [style.background]="dot.colorVar"
            ></span>
          }
        </span>
        <span class="banner__muted">
          {{ modeShortLabel() }} ·
          <span class="banner__count">{{ doneCount() }}/{{ axisTotal() }}</span>
          axes
        </span>
      </span>
    </div>
    <div class="banner__cta flex flex-col items-end gap-1">
      <ui-button
        class="banner__action"
        color="brand"
        [icon]="playIcon"
        (click)="resumeRequested.emit()"
      >
        Reprendre
      </ui-button>
      <span class="banner__mention">{{ resumeMention() }}</span>
    </div>
  </div>
</div>
