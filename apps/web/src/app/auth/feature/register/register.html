<div class="register">
  <ui-card class="register__card" [padding]="32">
    <div class="register__form">
      <h1 class="t-page-title">Inscription</h1>

      <div class="register__names">
        <ui-form-field
          label="Prénom"
          [(value)]="firstName"
          [error]="firstNameError()"
        />
        <ui-form-field
          label="Nom"
          [(value)]="lastName"
          [error]="lastNameError()"
        />
      </div>

      <ui-form-field
        label="Adresse email"
        type="email"
        placeholder="vous@exemple.fr"
        [icon]="mailIcon"
        [(value)]="email"
        [error]="emailError()"
      />

      <ui-select label="Secteur" [options]="sectorOptions()" [(value)]="sector" />

      <div class="register__password">
        <ui-password-field
          label="Mot de passe"
          placeholder="••••••••"
          [(value)]="password"
          [error]="passwordError()"
        />
        <ui-password-strength-meter [value]="password()" />
      </div>

      <ui-password-field
        label="Confirmer le mot de passe"
        placeholder="••••••••"
        [(value)]="confirmation"
        [valid]="confirmationValid()"
        [error]="confirmationError()"
      />

      @if (serverError(); as message) {
        <p class="register__server-error" role="alert">{{ message }}</p>
      }

      <ui-button color="brand" [loading]="pending()" (click)="submit()">
        S'inscrire
      </ui-button>

      <a routerLink="/login" class="register__link">J'ai déjà un compte</a>
    </div>
  </ui-card>
</div>
