<div class="flex flex-col gap-4">
  <h1 class="text-2xl font-bold">Inscription</h1>
  <input
    type="email"
    placeholder="Email"
    [value]="email()"
    (input)="email.set(inputValue($event))"
  />
  <input
    type="text"
    placeholder="Nom affiché"
    [value]="displayName()"
    (input)="displayName.set(inputValue($event))"
  />
  <input
    type="password"
    placeholder="Mot de passe"
    [value]="password()"
    (input)="password.set(inputValue($event))"
  />
  <select (change)="selectSector($event)">
    <option value="">Choisir un secteur</option>
    @for (sector of sectors(); track sector.code) {
      <option [value]="sector.code">{{ sector.label }}</option>
    }
  </select>
  @if (error(); as message) {
    <p>{{ message }}</p>
  }
  <button type="button" [disabled]="submitting()" (click)="submit()">
    S'inscrire
  </button>
  <a routerLink="/login">J'ai déjà un compte</a>
</div>
