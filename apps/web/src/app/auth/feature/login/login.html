<div class="login">
  <ui-card class="login__card" [padding]="32">
    <div class="login__form">
      <h1 class="t-page-title">Connexion</h1>

      <ui-form-field
        label="Adresse email"
        type="email"
        placeholder="vous@exemple.fr"
        [icon]="mailIcon"
        [(value)]="email"
        [error]="emailError()"
      />

      <ui-password-field
        label="Mot de passe"
        placeholder="••••••••"
        [(value)]="password"
        [error]="passwordError()"
      />

      @if (serverError(); as message) {
        <p class="login__server-error" role="alert">{{ message }}</p>
      }

      <ui-button color="brand" [loading]="pending()" (click)="submit()">
        Se connecter
      </ui-button>

      <a routerLink="/register" class="login__link">Créer un compte</a>
    </div>
  </ui-card>
</div>
