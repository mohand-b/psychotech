<div class="auth__panel">
  <div class="auth__head">
    <h1 class="auth__title">Connexion</h1>
    <p class="auth__subtitle">
      Reprenez votre préparation là où vous l'avez laissée.
    </p>
  </div>

  <div class="auth__fields">
    <ui-form-field
      label="Email"
      type="email"
      placeholder="vous@exemple.fr"
      [(value)]="email"
      [error]="emailError()"
    />
    <ui-password-field
      label="Mot de passe"
      placeholder="Votre mot de passe"
      [(value)]="password"
      [error]="passwordError()"
    />
    <span class="auth__forgot">Mot de passe oublié&nbsp;?</span>
  </div>

  @if (serverError(); as message) {
  <span class="auth__server-error" role="alert">
    <svg
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" x2="12" y1="8" y2="12"></line>
      <line x1="12" x2="12.01" y1="16" y2="16"></line>
    </svg>
    {{ message }}
  </span>
  }

  <div class="auth__actions">
    <ui-button
      color="brand"
      size="lg"
      [block]="true"
      [iconEnd]="arrowIcon"
      [relief]="'mobile'"
      [loading]="pending()"
      (click)="submit()"
    >
      Se connecter
    </ui-button>
  </div>

  <div class="auth__footer">
    <span class="auth__footer-hint">Pas encore de compte&nbsp;?</span>
    <a routerLink="/register" class="auth__footer-link">Créer un compte</a>
  </div>
</div>
