<div class="flex min-h-screen flex-col">
  @if (focusedHeader(); as header) {
    <ui-focused-header
      [title]="header.title"
      [backLabel]="header.backLabel"
      [backLink]="header.backLink"
      [duration]="header.duration"
      [closeLink]="header.closeLink"
    />
  } @else {
    <ui-navbar />
  }
  <main class="content flex-1 pb-16 md:pb-0">
    <router-outlet />
  </main>
</div>
