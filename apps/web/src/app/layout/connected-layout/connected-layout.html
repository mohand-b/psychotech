<div class="flex min-h-dvh flex-col">
  @if (focusedHeader(); as header) {
    <ui-focused-header
      [title]="header.title"
      [backLabel]="header.backLabel"
      [backLink]="header.backLink"
      [axisChip]="header.axisChip"
      [brandChip]="header.brandChip"
      [steps]="header.stepper ? sessionSteps() : []"
      [duration]="
        header.live
          ? (liveCountdown() ?? header.duration)
          : header.stepper
            ? stepperDuration()
            : header.duration
      "
      [timerSeverity]="header.live ? liveCountdownSeverity() : 'normal'"
      [showEnergy]="header.showEnergy"
      [closeLink]="header.closeLink"
      (closeRequested)="onCloseRequested(header)"
    />
  } @else {
    <ui-navbar [hideMobile]="mobileFlow() !== null" />
    @if (mobileFlow(); as flow) {
      <header
        class="flow-header navbar-surface safe-top flex min-h-14 items-center justify-between px-4 md:hidden"
      >
        <span class="logo logo--compact">Psycho<span class="logo__accent">Tech</span></span>
        @if (mobileFlowPresentation(flow); as presentation) {
          <span
            class="flow-header__chip"
            [style.background]="presentation.pastelVar"
            [style.border-color]="presentation.pastelBorderVar"
            [style.color]="presentation.textVar"
          >
            <ui-icon [img]="presentation.icon" [size]="13" />
            <span>{{ presentation.label }} · {{ flow.suffix }}</span>
          </span>
        }
      </header>
    }
  }
  <main
    class="content flex-1 md:pb-0"
    [class.content--nav-clearance]="focusedHeader() === null && mobileFlow() === null"
  >
    <router-outlet />
  </main>
</div>
