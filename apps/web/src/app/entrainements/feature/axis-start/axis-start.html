<section class="axis-start">
  <ui-axis-briefing
    [axis]="axis"
    [admissibilityThreshold]="admissibilityThreshold()"
    [optionsEnabled]="helpOptionAvailable"
    [(helpEnabled)]="helpEnabled"
  />

  <div class="axis-start__cta">
    <ui-button
      class="axis-start__cta-desktop"
      [color]="buttonColor"
      size="lg"
      [showArrow]="true"
      [loading]="starting()"
      (click)="start()"
    >
      Commencer
    </ui-button>
    <ui-button
      class="axis-start__cta-mobile"
      [color]="buttonColor"
      size="lg"
      [block]="true"
      [showArrow]="true"
      [loading]="starting()"
      (click)="start()"
    >
      Commencer
    </ui-button>
  </div>
</section>
