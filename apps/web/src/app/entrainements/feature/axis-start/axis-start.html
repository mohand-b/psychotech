<section class="axis-start">
  @if (interrupted) {
    <p class="axis-start__notice t-support">
      Votre épreuve précédente a été interrompue - elle ne peut pas reprendre en
      cours de route. Relancez un entraînement complet.
    </p>
  }
  <ui-axis-briefing
    [axis]="axis"
    [admissibilityThreshold]="admissibilityThreshold()"
    [optionsEnabled]="helpOptionAvailable"
    [(helpEnabled)]="helpEnabled"
  />

  <ui-button
    [color]="buttonColor"
    size="lg"
    [showArrow]="true"
    [loading]="starting()"
    (click)="start()"
  >
    Commencer
  </ui-button>
</section>
