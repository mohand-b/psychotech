<section class="page-shell axis-start">
  <ui-axis-briefing
    [axis]="axis"
    [admissibilityThreshold]="admissibilityThreshold()"
    [(optionEnabled)]="optionEnabled"
  />

  <div class="axis-start__cta">
    <ui-button
      [color]="buttonColor"
      size="lg"
      [block]="true"
      [showArrow]="true"
      [loading]="starting()"
      (click)="start()"
    >
      Commencer
    </ui-button>
  </div>
</section>
