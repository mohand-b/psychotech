<section class="page-shell axis-start">
  <ui-axis-briefing
    [axis]="axis"
    [tutorial]="tutorial"
    [showOptions]="!tutorial"
    [(enabledOptions)]="enabledOptions"
    [(logicFamily)]="logicFamily"
  />

  <div class="axis-start__cta">
    <ui-button
      [color]="buttonColor"
      size="lg"
      relief="mobile"
      [block]="true"
      [loading]="starting()"
      (click)="start()"
    >
      <span class="axis-start__cta-content">
        @if (tutorial) { Commencer la découverte } @else { Commencer
        <span class="axis-start__cta-sep"></span>
        <ui-bolt [size]="14" />
        <span class="t-mono">{{ energyCost }}</span>
        }
      </span>
    </ui-button>
    @if (tutorial) {
    <p class="axis-start__note">
      La découverte est toujours identique et ne consomme aucune énergie.
    </p>
    }
  </div>
</section>
