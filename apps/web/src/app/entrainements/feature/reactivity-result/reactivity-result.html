<ui-result-page>
  @if (result(); as r) {
  <ui-result-summary
    [axis]="r.axis"
    [score]="r.score"
    [band]="r.band"
    [previousScore]="r.previousScore"
    [bestScore]="r.bestScore"
    [isNewBest]="r.isNewBest"
    [isEqualBest]="r.isEqualBest"
    [sector]="r.sector"
    [completedAt]="r.completedAt"
  />

  @if (scored(); as s) {
  <ui-result-panel>
    <ui-result-metrics panelStart [rows]="metricRows()" />
    <ui-result-timing
      panelEnd
      heading="Temps de réaction"
      note="Chaque point est un stimulus, hauteur = temps de réaction. La courbe montre votre tendance au fil de l'épreuve."
      [showReview]="false"
    >
      <ui-reactivity-tr-chart
        [points]="s.points"
        [trend]="s.trend"
        [meanMs]="s.trMoyMs"
        [waitPresses]="r.waitPresses"
      />
    </ui-result-timing>
  </ui-result-panel>
  } @if (recommendations().length > 0) {
  <ui-result-recommendation [axis]="axis" [findings]="recommendations()" />
  }

  <ui-result-actions
    footnote="Chaque entraînement génère une nouvelle séquence de signaux."
    (newTraining)="newTraining()"
    [backLabel]="backLabel"
    (back)="back()"
  />
  }
</ui-result-page>
