<ui-result-page>
  @if (result(); as r) {
  <ui-result-summary
    [axis]="r.axis"
    [score]="r.score"
    [band]="r.band"
    [previousBestScore]="r.previousBestScore"
    [bestScore]="r.bestScore"
    [isNewBest]="r.isNewBest"
    [isEqualBest]="r.isEqualBest"
    [sector]="r.sector"
    [completedAt]="r.completedAt"
    [recordVisible]="recordVisible()"
  />

  @if (scored()) {
  <ui-result-panel>
    <ui-result-metrics panelStart [rows]="metricRows()" />
    <ui-result-timing
      panelEnd
      heading="Gestion du temps"
      note="Hauteur = temps passé sur l'item, dans l'ordre de la session."
      (review)="review()"
    >
      <ui-time-chart
        [entries]="chartEntries()"
        [boundariesAfter]="familyBoundaries()"
      />
    </ui-result-timing>
    @if (families().length > 0) {
    <ui-result-family-bars panelFull [families]="families()" />
    }
  </ui-result-panel>
  } @if (recommendations().length > 0) {
  <ui-result-recommendation [axis]="axis" [findings]="recommendations()" />
  }

  <ui-result-actions
    footnote="Chaque entraînement génère une nouvelle série d'items - les exercices ne se répètent jamais."
    (newTraining)="newTraining()"
    [backLabel]="backLabel"
    (back)="back()"
  />
  }
</ui-result-page>
