<ui-result-page>
  @if (result(); as r) {
  <ui-result-summary
    [axis]="r.axis"
    [score]="r.score"
    [band]="r.band"
    [previousScore]="r.previousScore"
    [bestScore]="r.bestScore"
    [isNewBest]="r.isNewBest"
    [isEqualBest]="r.isEqualBest"
    [sector]="r.sector"
    [completedAt]="r.completedAt"
  />

  @if (scored()) {
  <ui-result-panel>
    <ui-result-metrics panelStart [rows]="metricRows()" />
    <ui-result-timing
      panelEnd
      heading="Gestion du temps"
      note="Hauteur = temps passé sur l'item, dans l'ordre de la session."
      (review)="review()"
    >
      <ui-time-chart [entries]="chartEntries()" />
    </ui-result-timing>
  </ui-result-panel>
  } @if (recommendation(); as reco) {
  <ui-result-recommendation [recommendation]="reco" />
  }

  <ui-result-actions
    footnote="Chaque entraînement génère une nouvelle série d'items - les suites ne se répètent jamais."
    (newTraining)="newTraining()"
    [backLabel]="backLabel"
    (back)="back()"
  />
  }
</ui-result-page>
