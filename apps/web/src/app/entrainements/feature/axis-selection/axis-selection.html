<section class="axis-selection">
  <header class="axis-selection__intro">
    <h1 class="axis-selection__title">Quel axe souhaitez-vous travailler ?</h1>
    <p class="axis-selection__subtitle">
      Une session courte (3–5 min) avec retour immédiat. Chaque axe coûte
      {{ cost }} énergie.
    </p>
  </header>

  <div class="axis-selection__grid">
    @for (card of axisCards(); track card.axis) {
      <ui-axis-training-card
        [axis]="card.axis"
        [description]="card.description"
        [cost]="cost"
        [bestScore]="card.bestScore"
        [badge]="card.badge"
        (launch)="startAxis(card.axis)"
      />
    }
  </div>
</section>
