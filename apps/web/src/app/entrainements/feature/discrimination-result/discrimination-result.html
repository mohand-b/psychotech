<ui-result-page>
  @if (result(); as r) {
  <ui-result-summary
    [axis]="r.axis"
    [score]="r.score"
    [band]="r.band"
    [previousBestScore]="r.previousBestScore"
    [bestScore]="r.bestScore"
    [isNewBest]="r.isNewBest"
    [isEqualBest]="r.isEqualBest"
    [sector]="r.sector"
    [completedAt]="r.completedAt"
  />

  @if (scored()) {
  <ui-result-panel>
    <ui-result-metrics panelStart [rows]="metricRows()" />
    <ui-result-timing
      panelEnd
      heading="Gestion du temps"
      note="Hauteur = temps de décision par essai, dans l'ordre de la session."
      [showReview]="false"
    >
      <ui-time-chart [entries]="chartEntries()" itemLabel="Essai" />
    </ui-result-timing>
  </ui-result-panel>
  } @if (recommendations().length > 0) {
  <ui-result-recommendation [axis]="axis" [findings]="recommendations()" />
  }

  <ui-result-actions
    footnote="Chaque entraînement génère de nouvelles paires."
    (newTraining)="newTraining()"
    [backLabel]="backLabel"
    (back)="back()"
  />
  }
</ui-result-page>
