<section class="page-shell sim-brief">
  @if (loaded() && axis(); as currentAxis) {
  <ui-axis-briefing
    [axis]="currentAxis"
    [showOptions]="false"
    [positionLabel]="positionLabel()"
    [showPairing]="motricityAxis()"
  >
    @if (motricityAxis()) {
    <div briefingPairing class="sim-brief__pairing">
      <ui-gamepad-pairing
        [pairing]="gamepadPairing()"
        [connected]="gamepadConnected()"
        [latency]="gamepadLatency()"
        [latencyGood]="gamepadLatencyGood()"
      />
    </div>
    }
  </ui-axis-briefing>

  <div class="sim-brief__footer">
    <div class="sim-brief__cta">
      <ui-button
        [color]="buttonColor()"
        size="lg"
        relief="mobile"
        [block]="true"
        [showArrow]="true"
        (click)="start()"
      >
        Commencer l'axe
      </ui-button>
    </div>
    <p class="sim-brief__note">Le chronomètre démarre après le décompte.</p>
  </div>
  }
</section>
