<article class="summary">
  <span class="t-label summary__label">Résultat d'axe</span>
  <p class="summary__subtitle">{{ subtitle() }}</p>
  <span
    class="summary__chip"
    [style.background]="presentation().pastelVar"
    [style.border-color]="presentation().pastelBorderVar"
    [style.color]="presentation().textVar"
  >
    <ui-icon [img]="presentation().icon" [size]="14" />
    <span>{{ presentation().label }}</span>
  </span>
  <div class="summary__score">
    <span class="summary__score-value t-mono">{{ score() }}</span>
    <span class="summary__score-max t-mono">/100</span>
    @if (recordVisible()) { @if (delta(); as d) { @if (d !== 0) {
    <span
      class="summary__delta t-mono"
      [class.summary__delta--up]="d > 0"
      [class.summary__delta--down]="d < 0"
      >{{ d > 0 ? '+' + d : d }}</span
    >
    } } }
  </div>
  <span class="summary__verdict">
    <span
      class="summary__verdict-dot"
      [style.background]="verdictColor()"
    ></span>
    {{ verdictLabel() }}
  </span>
  @if (recordVisible()) {
  <p class="summary__best">
    Meilleur score sur cet axe :
    <strong class="t-mono">{{ bestScore() }}</strong>{{ bestSuffix() }}
  </p>
  }
</article>
