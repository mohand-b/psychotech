<div class="seq">
  @for (term of terms(); track $index) {
    <span class="seq__step">
      <span class="seq__term t-mono">{{ term }}</span>
      <svg
        class="seq__arrow"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M5 12h14"></path>
        <path d="m12 5 7 7-7 7"></path>
      </svg>
    </span>
  }
  <span
    class="seq__unknown"
    [class.seq__unknown--filled]="filledValue() !== null"
    [class.seq__unknown--correct]="
      filledValue() !== null && filledTone() === 'correct'
    "
  >
    <span class="seq__unknown-value t-mono" aria-label="Terme à trouver"
      >{{ filledValue() ?? '?' }}</span
    >
  </span>
  @if (hint(); as hintText) {
    <ui-rule-hint
      #ruleHint
      [hint]="hintText"
      [used]="hintUsed()"
      [popWidth]="296"
      (opened)="hintOpened.emit()"
    />
  }
</div>
